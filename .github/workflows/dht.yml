name: dht

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: dht heap
        run: go test -v -count=1 -cover -test.run Test_dht_heap ./dht
