name: llm

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: llm
        run: go test -v -count=1 -cover ./llm/
        env:
          DOUBAO_SK: ${{ vars.DOUBAO_SK }}
