name: tti

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: tti
        run: go test -v -count=1 -cover ./tti/
        env:
          COS_AK: ${{ vars.COS_AK }}
          COS_SK: ${{ vars.COS_SK }}
          TX_SK: ${{ vars.TX_SK }}
          DOUBAO_SK: ${{ vars.DOUBAO_SK }}
