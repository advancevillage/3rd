name: sts

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: sts
        run: go test -v -count=1 -cover ./sts/
        env:
          STS_DSN: sts://${{ vars.COS_AK }}:${{ vars.COS_SK }}@${{ vars.SMS_RGN }}
